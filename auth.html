<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Авторизация</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#fff;
            font-family:'BarboskinsAkzident', sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }
        @font-face {
            font-family:'BarboskinsAkzident';
            src:url('barboskinsakzident.otf') format('opentype');
        }
        .auth-box {
            width:400px;
            padding:40px;
            border:2px solid #ccc;
            background:#f9f9f9;
            display:flex;
            flex-direction:column;
            align-items:center;
        }
        .auth-logo { max-width:180px; margin-bottom:30px; }
        .auth-box h2 { text-align:center; margin-bottom:20px; font-weight:normal; }
        .auth-box input {
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border:2px solid #ccc;
            font-family:'BarboskinsAkzident', sans-serif;
            font-size:16px;
            background:#fff;
        }
        .auth-box input:focus { outline:none; border-color:#888; }
        .auth-box .file-input {
            width:100%;
            margin-bottom:15px;
            padding:6px;
            border:2px solid #ccc;
            background:#fff;
        }
        .auth-box .file-input input {
            border:none;
            padding:0;
            margin:0;
            width:100%;
            font-size:14px;
        }
        .auth-box .file-input.hidden { display:none; }
        .auth-box button {
            width:100%;
            padding:12px;
            background:#222;
            color:#fff;
            border:none;
            cursor:pointer;
            font-family:'BarboskinsAkzident', sans-serif;
            font-size:18px;
            transition:0.2s;
        }
        .auth-box button:hover { background:#555; }
        .auth-box .switch {
            text-align:center;
            margin-top:15px;
            color:#888;
            cursor:pointer;
        }
        .auth-box .switch:hover { color:#222; }
        .avatar-preview {
            width:64px;
            height:64px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid #ccc;
            margin-bottom:15px;
        }
        .avatar-preview.hidden { display:none; }
        .error-msg {
            color:#c0392b;
            font-size:14px;
            margin-bottom:10px;
            display:none;
            text-align:center;
        }
    </style>
</head>
<body>
    <div class="auth-box" id="authBox">
        <img class="auth-logo" src="wawmedia.svg" alt="WAW">
        <h2 id="authTitle">Регистрация</h2>
        <div id="errorMsg" class="error-msg"></div>
        <input type="text" id="username" placeholder="Имя пользователя">
        <input type="password" id="password" placeholder="Пароль">
        <div class="file-input" id="fileInput">
            <input type="file" id="avatarFile" accept="image/*">
        </div>
        <img id="avatarPreview" class="avatar-preview hidden" src="">
        <button id="submitBtn">Создать аккаунт</button>
        <div class="switch" id="switchBtn">Уже есть аккаунт? Войти</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBVFuffO5WUSL5ck1sDAZw8hGnAsYLxnz4",
            authDomain: "cobann-13bfa.firebaseapp.com",
            databaseURL: "https://cobann-13bfa-default-rtdb.firebaseio.com",
            projectId: "cobann-13bfa",
            storageBucket: "cobann-13bfa.firebasestorage.app",
            messagingSenderId: "706581136006",
            appId: "1:706581136006:web:e304a2643e84e3df6a8707",
            measurementId: "G-HJ01VHYXF2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isLogin = false;
        let avatarBase64 = '';

        const errorMsg = document.getElementById('errorMsg');
        const fileInput = document.getElementById('fileInput');
        const avatarPreview = document.getElementById('avatarPreview');

        document.getElementById('avatarFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 64;
                    canvas.height = 64;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 64, 64);
                    avatarBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    avatarPreview.src = avatarBase64;
                    avatarPreview.classList.remove('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('switchBtn').addEventListener('click', function() {
            isLogin = !isLogin;
            document.getElementById('authTitle').textContent = isLogin ? 'Вход' : 'Регистрация';
            document.getElementById('submitBtn').textContent = isLogin ? 'Войти' : 'Создать аккаунт';
            this.textContent = isLogin ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
            
            if (isLogin) {
                fileInput.classList.add('hidden');
                avatarPreview.classList.add('hidden');
            } else {
                fileInput.classList.remove('hidden');
                if (avatarBase64) {
                    avatarPreview.classList.remove('hidden');
                }
            }
            errorMsg.style.display = 'none';
        });

        function showError(text) {
            errorMsg.textContent = text;
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
        }

        document.getElementById('submitBtn').addEventListener('click', function() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username) { showError('Введите имя пользователя'); return; }
            if (!password) { showError('Введите пароль'); return; }
            if (password.length < 4) { showError('Пароль должен быть не менее 4 символов'); return; }

            if (isLogin) {
                // Вход
                db.ref('users').orderByChild('name').equalTo(username).once('value').then(snap => {
                    let found = false;
                    snap.forEach(child => {
                        const user = child.val();
                        if (user.password === password) {
                            found = true;
                            localStorage.setItem('userId', child.key);
                            window.location.href = 'index.html';
                        }
                    });
                    if (!found) showError('Неверное имя или пароль');
                });
            } else {
                // Регистрация
                if (!avatarBase64) { showError('Выберите аватар'); return; }
                
                // Проверяем, нет ли такого имени
                db.ref('users').orderByChild('name').equalTo(username).once('value').then(snap => {
                    if (snap.exists()) {
                        showError('Пользователь с таким именем уже существует');
                        return;
                    }
                    const newUserRef = db.ref('users').push();
                    newUserRef.set({
                        name: username,
                        password: password,
                        avatar: avatarBase64,
                        createdAt: Date.now()
                    }).then(() => {
                        localStorage.setItem('userId', newUserRef.key);
                        window.location.href = 'index.html';
                    });
                });
            }
        });

        // Если уже залогинены - на главную
        if (localStorage.getItem('userId')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
