<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Авторизация</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#fff;
            font-family:'BarboskinsAkzident', sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }
        @font-face {
            font-family:'BarboskinsAkzident';
            src:url('barboskinsakzident.otf') format('opentype');
        }
        .auth-box {
            width:400px;
            padding:40px;
            border:2px solid #ccc;
            background:#f9f9f9;
            display:flex;
            flex-direction:column;
            align-items:center;
        }
        .auth-logo { max-width:180px; margin-bottom:30px; }
        .auth-box h2 { text-align:center; margin-bottom:20px; font-weight:normal; }
        .auth-box input {
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border:2px solid #ccc;
            font-family:'BarboskinsAkzident', sans-serif;
            font-size:16px;
            background:#fff;
        }
        .auth-box input:focus { outline:none; border-color:#888; }
        .auth-box .file-input {
            width:100%;
            margin-bottom:15px;
            padding:6px;
            border:2px solid #ccc;
            background:#fff;
        }
        .auth-box .file-input input {
            border:none;
            padding:0;
            margin:0;
            width:100%;
            font-size:14px;
        }
        .auth-box .file-input.hidden { display:none; }
        .auth-box button {
            width:100%;
            padding:12px;
            background:#222;
            color:#fff;
            border:none;
            cursor:pointer;
            font-family:'BarboskinsAkzident', sans-serif;
            font-size:18px;
            transition:0.2s;
        }
        .auth-box button:hover { background:#555; }
        .auth-box .switch {
            text-align:center;
            margin-top:15px;
            color:#888;
            cursor:pointer;
        }
        .auth-box .switch:hover { color:#222; }
        .avatar-preview {
            width:64px;
            height:64px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid #ccc;
            margin-bottom:15px;
        }
        .avatar-preview.hidden { display:none; }
        .error-msg {
            color:#c0392b;
            font-size:14px;
            margin-bottom:10px;
            display:none;
            text-align:center;
        }
        .rate-msg {
            color:#e67e22;
            font-size:13px;
            margin-bottom:10px;
            display:none;
            text-align:center;
        }
        .warn-msg {
            color:#856404;
            background:#fff3cd;
            border:2px solid #ffc107;
            padding:10px;
            margin-bottom:10px;
            display:none;
            text-align:center;
            font-size:14px;
        }
        .banned-overlay {
            position:fixed;
            top:0; left:0; right:0; bottom:0;
            background:rgba(0,0,0,0.95);
            display:none;
            justify-content:center;
            align-items:center;
            z-index:9999;
            flex-direction:column;
            color:#fff;
            text-align:center;
            padding:40px;
        }
        .banned-overlay.show { display:flex; }
        .banned-overlay .logo-big { max-width:200px; margin-bottom:30px; }
        .banned-overlay h1 { font-size:44px; color:#e74c3c; margin-bottom:15px; font-weight:normal; }
        .banned-overlay p { font-size:20px; max-width:600px; color:#ccc; }
        .banned-overlay .sub { font-size:14px; color:#888; margin-top:15px; }
    </style>
</head>
<body>
    <div class="banned-overlay" id="bannedOverlay">
        <img class="logo-big" src="wawmedia.svg" alt="WAW Media">
        <h1>ДОСТУП ЗАБЛОКИРОВАН</h1>
        <p>Ваше устройство заблокировано за нарушение правил платформы.</p>
        <p class="sub">Вы не можете создавать новые аккаунты.</p>
    </div>

    <div class="auth-box" id="authBox">
        <img class="auth-logo" src="wawmedia.svg" alt="WAW">
        <h2 id="authTitle">Регистрация</h2>
        <div id="errorMsg" class="error-msg"></div>
        <div id="warnMsg" class="warn-msg"></div>
        <div id="rateMsg" class="rate-msg"></div>
        <input type="text" id="username" placeholder="Имя пользователя">
        <input type="password" id="password" placeholder="Пароль">
        <div class="file-input" id="fileInput">
            <input type="file" id="avatarFile" accept="image/*">
        </div>
        <img id="avatarPreview" class="avatar-preview hidden" src="">
        <button id="submitBtn">Создать аккаунт</button>
        <div class="switch" id="switchBtn">Уже есть аккаунт? Войти</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBVFuffO5WUSL5ck1sDAZw8hGnAsYLxnz4",
            authDomain: "cobann-13bfa.firebaseapp.com",
            databaseURL: "https://cobann-13bfa-default-rtdb.firebaseio.com",
            projectId: "cobann-13bfa",
            storageBucket: "cobann-13bfa.firebasestorage.app",
            messagingSenderId: "706581136006",
            appId: "1:706581136006:web:e304a2643e84e3df6a8707",
            measurementId: "G-HJ01VHYXF2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isLogin = false;
        let avatarBase64 = '';

        const errorMsg = document.getElementById('errorMsg');
        const warnMsg = document.getElementById('warnMsg');
        const rateMsg = document.getElementById('rateMsg');
        const fileInput = document.getElementById('fileInput');
        const avatarPreview = document.getElementById('avatarPreview');

        let deviceId = localStorage.getItem('deviceId');
        if (!deviceId) {
            deviceId = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('deviceId', deviceId);
        }

        function checkBan() {
            db.ref('banned/devices/' + deviceId).once('value', snap => {
                if (snap.exists()) {
                    document.getElementById('bannedOverlay').classList.add('show');
                    document.querySelectorAll('input, button').forEach(el => {
                        el.disabled = true;
                        el.style.opacity = '0.3';
                    });
                    return true;
                }
                return false;
            });
        }
        checkBan();

        function checkTimeBetweenAccounts() {
            return new Promise((resolve) => {
                const now = Date.now();
                const thirtyMinutesAgo = now - 1800000;

                db.ref('registrations/' + deviceId).orderByValue().startAt(thirtyMinutesAgo).once('value', snap => {
                    let lastTime = 0;
                    snap.forEach(child => {
                        const val = child.val();
                        if (val > lastTime) lastTime = val;
                    });
                    if (lastTime === 0) {
                        resolve({ ok: true, waitTime: 0 });
                        return;
                    }
                    const timePassed = now - lastTime;
                    if (timePassed < 1800000) {
                        const waitTime = 1800000 - timePassed;
                        resolve({ ok: false, waitTime: waitTime });
                    } else {
                        resolve({ ok: true, waitTime: 0 });
                    }
                });
            });
        }

        function registerDevice() {
            const ref = db.ref('registrations/' + deviceId).push();
            return ref.set(Date.now());
        }

        document.getElementById('avatarFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 64;
                    canvas.height = 64;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 64, 64);
                    avatarBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    avatarPreview.src = avatarBase64;
                    avatarPreview.classList.remove('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('switchBtn').addEventListener('click', function() {
            isLogin = !isLogin;
            document.getElementById('authTitle').textContent = isLogin ? 'Вход' : 'Регистрация';
            document.getElementById('submitBtn').textContent = isLogin ? 'Войти' : 'Создать аккаунт';
            this.textContent = isLogin ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
            
            if (isLogin) {
                fileInput.classList.add('hidden');
                avatarPreview.classList.add('hidden');
            } else {
                fileInput.classList.remove('hidden');
                if (avatarBase64) {
                    avatarPreview.classList.remove('hidden');
                }
            }
            errorMsg.style.display = 'none';
            warnMsg.style.display = 'none';
            rateMsg.style.display = 'none';
        });

        function showError(text) {
            errorMsg.textContent = text;
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 5000);
        }

        function showRateLimit(waitSeconds) {
            const minutes = Math.floor(waitSeconds / 60);
            const seconds = Math.round(waitSeconds % 60);
            rateMsg.textContent = 'Подождите ' + minutes + 'м ' + seconds + 'с перед созданием нового аккаунта (минимум 30 минут между аккаунтами)';
            rateMsg.style.display = 'block';
        }

        document.getElementById('submitBtn').addEventListener('click', function() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username) { showError('Введите имя пользователя'); return; }
            if (!password) { showError('Введите пароль'); return; }
            if (password.length < 4) { showError('Пароль должен быть не менее 4 символов'); return; }

            if (isLogin) {
                db.ref('users').orderByChild('name').equalTo(username).once('value').then(snap => {
                    let found = false;
                    snap.forEach(child => {
                        const user = child.val();
                        if (user.password === password) {
                            found = true;
                            localStorage.setItem('userId', child.key);
                            window.location.href = 'index.html';
                        }
                    });
                    if (!found) showError('Неверное имя или пароль');
                });
            } else {
                if (!avatarBase64) { showError('Выберите аватар'); return; }

                checkBan();
                checkTimeBetweenAccounts().then(result => {
                    if (!result.ok) {
                        showRateLimit(result.waitTime / 1000);
                        return;
                    }

                    db.ref('users').orderByChild('name').equalTo(username).once('value').then(snap => {
                        if (snap.exists()) {
                            showError('Пользователь с таким именем уже существует');
                            return;
                        }

                        const newUserRef = db.ref('users').push();
                        newUserRef.set({
                            name: username,
                            password: password,
                            avatar: avatarBase64,
                            createdAt: Date.now(),
                            deviceId: deviceId
                        }).then(() => {
                            registerDevice().then(() => {
                                localStorage.setItem('userId', newUserRef.key);
                                window.location.href = 'index.html';
                            });
                        });
                    });
                });
            }
        });
    </script>
</body>
</html>
